<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, xr-spatial-tracking"/>
<title>מגדל הגורל – WebXR</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Georgia',serif; direction:rtl; background:#07040f; color:#fff; overflow:hidden; }
canvas { display:block; }
#ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; display:flex; flex-direction:column; justify-content:space-between; padding:16px; }
#top { display:flex; justify-content:space-between; align-items:flex-start; }
.box { background:rgba(7,4,15,.92); border:1px solid #6c3fc577; border-radius:8px; padding:11px 16px; min-width:115px; box-shadow:0 0 16px #6c3fc522; }
.lbl { color:#9c6fff; font-size:10px; letter-spacing:2px; text-transform:uppercase; }
.val { font-size:20px; font-weight:bold; margin-top:3px; }
.val.hp{color:#ff7766;} .val.nrg{color:#66aaff;} .val.en{color:#ff9955;}
.sub { font-size:12px; margin-top:2px; color:#9c6fff88; }
#msg { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:36px; letter-spacing:6px; text-shadow:0 0 40px currentColor; pointer-events:none; opacity:0; transition:opacity .4s; text-align:center; }
#bot { display:flex; justify-content:flex-end; align-items:center; gap:14px; pointer-events:all; }
#dcnt { color:#6c4f90; font-size:12px; letter-spacing:1px; }
#vrb { background:linear-gradient(135deg,#3a1a7a,#6c3fc5); color:#e0d0ff; border:1px solid #9c6fff44; padding:11px 22px; border-radius:4px; font-size:13px; letter-spacing:2px; cursor:pointer; transition:all .3s; font-family:'Georgia',serif; }
#vrb:hover{background:linear-gradient(135deg,#5a2aba,#9c5ff5);transform:translateY(-1px);}
#vrb:disabled{opacity:.35;cursor:default;transform:none;}
#audio-btn { background:rgba(20,10,40,.8); color:#9c6fff; border:1px solid #6c3fc544; padding:8px 14px; border-radius:4px; font-size:12px; cursor:pointer; letter-spacing:1px; }
</style>
</head>
<body>
<div id="ui">
  <div id="top">
    <div class="box"><div class="lbl">שחקן</div><div class="val hp" id="php">80 / 80</div><div class="sub" id="pblk" style="display:none">🛡 <span id="pblkv">0</span></div></div>
    <div class="box" style="text-align:center"><div class="lbl">אנרגיה</div><div class="val nrg" id="nrg">3 / 3</div><div class="sub">תור: <span id="trn">שלך</span></div></div>
    <div class="box" style="text-align:left"><div class="lbl">אויב</div><div class="val en" id="ehp">60 / 60</div><div class="sub" id="itn"></div></div>
  </div>
  <div id="msg"></div>
  <div id="bot">
    <button id="audio-btn" onclick="startAudio()">🔊 הפעל מוזיקה</button>
    <div id="dcnt">חפיסה: <span id="dn">15</span> | גלאי: <span id="di">0</span></div>
    <button id="vrb">☽ מציאות מדומה</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════
// AUDIO ENGINE (Web Audio API)
// ═══════════════════════════════════════
let audioCtx = null;
let musicNodes = [];

function startAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  document.getElementById('audio-btn').textContent = '🔊 מוזיקה פועלת';
  startAmbient();
}

function startAmbient() {
  if (!audioCtx) return;
  const master = audioCtx.createGain(); master.gain.value = 0.18; master.connect(audioCtx.destination);

  // Deep drone layer
  [55, 82.5, 110].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = i === 0 ? 'sine' : 'triangle';
    osc.frequency.value = freq;
    g.gain.value = i === 0 ? 0.6 : 0.3;
    osc.connect(g); g.connect(master); osc.start();
    musicNodes.push(osc);
    // Slow tremolo
    const lfo = audioCtx.createOscillator();
    const lfoG = audioCtx.createGain(); lfoG.gain.value = 0.1;
    lfo.frequency.value = 0.2 + i * 0.07; lfo.type = 'sine';
    lfo.connect(lfoG); lfoG.connect(g.gain); lfo.start();
    musicNodes.push(lfo);
  });

  // Rhythmic pulse every ~2s
  function pulse() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = 110;
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
    osc.connect(g); g.connect(master); osc.start(); osc.stop(audioCtx.currentTime + 0.8);
    setTimeout(pulse, 1800 + Math.random() * 800);
  }
  pulse();

  // Occasional high sparkle
  function sparkle() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = 880 + Math.random() * 440;
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
    osc.connect(g); g.connect(master); osc.start(); osc.stop(audioCtx.currentTime + 1.2);
    setTimeout(sparkle, 3000 + Math.random() * 4000);
  }
  sparkle();
}

function sndCard() {
  if (!audioCtx) return;
  const g = audioCtx.createGain(); g.connect(audioCtx.destination); g.gain.value = 0.25;
  // Whoosh
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.25, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1-i/d.length) * 0.5;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const filt = audioCtx.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = 2000; filt.Q.value = 0.5;
  src.connect(filt); filt.connect(g); src.start();
  // Tone
  const osc = audioCtx.createOscillator(); const og = audioCtx.createGain(); og.gain.value = 0.15;
  osc.frequency.setValueAtTime(600, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.25);
  og.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
  osc.connect(og); og.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.25);
}

function sndHit() {
  if (!audioCtx) return;
  const g = audioCtx.createGain(); g.connect(audioCtx.destination); g.gain.value = 0.4;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.4, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/d.length, 2);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const filt = audioCtx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 400;
  src.connect(filt); filt.connect(g); src.start();
}

function sndShield() {
  if (!audioCtx) return;
  [440, 660, 880].forEach((f, i) => {
    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); g.gain.value = 0.12;
    osc.type = 'sine'; osc.frequency.value = f;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5 + i * 0.1);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + i * 0.03); osc.stop(audioCtx.currentTime + 0.6);
  });
}

function sndEndTurn() {
  if (!audioCtx) return;
  [220, 330].forEach((f, i) => {
    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); g.gain.value = 0.15;
    osc.type = 'triangle'; osc.frequency.value = f;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + i * 0.08); osc.stop(audioCtx.currentTime + 0.4);
  });
}

function sndVictory() {
  if (!audioCtx) return;
  [523, 659, 784, 1047].forEach((f, i) => {
    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); g.gain.value = 0.2;
    osc.type = 'triangle'; osc.frequency.value = f;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + i * 0.12); osc.stop(audioCtx.currentTime + 1.2);
  });
}

function sndDefeat() {
  if (!audioCtx) return;
  [300, 220, 160, 110].forEach((f, i) => {
    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); g.gain.value = 0.2;
    osc.type = 'sawtooth'; osc.frequency.value = f;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + i * 0.15); osc.stop(audioCtx.currentTime + 0.9);
  });
}

function sndDraw() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); g.gain.value = 0.1;
  osc.type = 'sine'; osc.frequency.setValueAtTime(400 + Math.random() * 200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

// ═══════════════════════════════════════
// SCENE
// ═══════════════════════════════════════
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x07040f, 0.055);
const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.01, 100);
camera.position.set(0, 0.3, 4.2);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.xr.enabled = true;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.prepend(renderer.domElement);
const stage = new THREE.Group();
stage.position.set(0, 0, -3.5);
scene.add(stage);

// LIGHTS
scene.add(new THREE.AmbientLight(0x180524, 2));
const pLight = new THREE.PointLight(0x9c6fff, 4, 20); pLight.position.set(4,5,3); scene.add(pLight);
const gLight = new THREE.PointLight(0xc9a84c, 2, 14); gLight.position.set(0,6,1); scene.add(gLight);
const fLight = new THREE.PointLight(0xff4400, 2.5, 10); fLight.position.set(-4,-1,2); scene.add(fLight);
const eLight = new THREE.PointLight(0xff0000, 3, 7); scene.add(eLight);
const aLight = new THREE.SpotLight(0x4422aa, 2, 20, Math.PI/4, 0.5); aLight.position.set(0,8,-2); aLight.castShadow=true; scene.add(aLight);

// BG PARTICLES
function mkBg(n,spread,col,sz) {
  const g=new THREE.BufferGeometry(), p=new Float32Array(n*3);
  for(let i=0;i<n*3;i++) p[i]=(Math.random()-.5)*spread;
  g.setAttribute('position',new THREE.BufferAttribute(p,3));
  return new THREE.Points(g,new THREE.PointsMaterial({color:col,size:sz,transparent:true,opacity:.5}));
}
const bgStars=mkBg(1000,40,0x9c6fff,.02); const bgGold=mkBg(250,18,0xc9a84c,.035);
scene.add(bgStars); scene.add(bgGold);

// ═══════════════════════════════════════
// ARENA
// ═══════════════════════════════════════
function buildArena() {
  // Glowing floor platform
  const floorGeo = new THREE.CylinderGeometry(3.5, 3.8, 0.12, 16);
  const floorMat = new THREE.MeshStandardMaterial({ color:0x1a0a3a, roughness:0.4, metalness:0.7, emissive:0x4422aa, emissiveIntensity:0.15 });
  const floor = new THREE.Mesh(floorGeo, floorMat); floor.position.y=-1.6; floor.receiveShadow=true; stage.add(floor);

  // Floor glow ring
  const ringGeo = new THREE.TorusGeometry(3.5, 0.04, 8, 48);
  const ringMat = new THREE.MeshBasicMaterial({ color:0x9c6fff, transparent:true, opacity:0.6 });
  const ring = new THREE.Mesh(ringGeo, ringMat); ring.position.y=-1.54; ring.rotation.x=Math.PI/2; stage.add(ring);

  // Inner rune circle
  const runeGeo = new THREE.TorusGeometry(1.8, 0.025, 6, 40);
  const runeMat = new THREE.MeshBasicMaterial({ color:0xc9a84c, transparent:true, opacity:0.45 });
  const rune = new THREE.Mesh(runeGeo, runeMat); rune.position.y=-1.53; rune.rotation.x=Math.PI/2; stage.add(rune);

  // Pillars
  [-3, 3].forEach(x => {
    const pillarGeo = new THREE.CylinderGeometry(0.18, 0.22, 4, 8);
    const pillarMat = new THREE.MeshStandardMaterial({ color:0x2a1550, roughness:0.6, metalness:0.4 });
    const pillar = new THREE.Mesh(pillarGeo, pillarMat); pillar.position.set(x,-0.1,-1); pillar.castShadow=true; stage.add(pillar);

    // Pillar cap
    const capGeo = new THREE.BoxGeometry(0.5, 0.2, 0.5);
    const cap = new THREE.Mesh(capGeo, pillarMat); cap.position.set(x,1.9,-1); stage.add(cap);

    // Torch flame
    const torchLight = new THREE.PointLight(0xff6600, 2, 3);
    torchLight.position.set(x, 2.2, -1); stage.add(torchLight);
    torchLight.userData.isTorch=true; torchLight.userData.baseIntensity=2;

    // Flame mesh
    const flameGeo = new THREE.ConeGeometry(0.08, 0.3, 8);
    const flameMat = new THREE.MeshBasicMaterial({ color:0xff6600, transparent:true, opacity:0.85 });
    const flame = new THREE.Mesh(flameGeo, flameMat); flame.position.set(x, 2.25, -1); stage.add(flame);
    flame.userData.isFlame=true;
  });

  // Background wall
  const wallGeo = new THREE.PlaneGeometry(14, 7);
  const wallMat = new THREE.MeshStandardMaterial({ color:0x0a0520, roughness:0.9, metalness:0.1 });
  const wall = new THREE.Mesh(wallGeo, wallMat); wall.position.set(0,1,-3.5); stage.add(wall);

  // Wall rune pattern using points
  const runePoints = new THREE.BufferGeometry();
  const rp = []; const RC=200;
  for(let i=0;i<RC;i++){
    const a=(i/RC)*Math.PI*2, r=1.5+Math.random()*.8;
    rp.push(Math.cos(a)*r*2.5, Math.sin(a)*r*.8+0.5, -3.4);
  }
  runePoints.setAttribute('position',new THREE.BufferAttribute(new Float32Array(rp),3));
  stage.add(new THREE.Points(runePoints,new THREE.PointsMaterial({color:0x6c3fc5,size:0.04,transparent:true,opacity:0.4})));
}
buildArena();

// ═══════════════════════════════════════
// CARD TYPES
// ═══════════════════════════════════════
const CARDS=[
  {name:'התקפה',    type:'attack', value:6,  cost:1, bg:'#3d0a0a',border:'#c0392b',accent:'#ff6666',icon:'⚔️', rar:'★☆☆',desc:'פגע באויב'},
  {name:'הגנה',     type:'defense',value:5,  cost:1, bg:'#0a1a3d',border:'#2980b9',accent:'#66aaff',icon:'🛡️',rar:'★☆☆',desc:'קבל מגן'},
  {name:'מכה חזקה', type:'attack', value:14, cost:2, bg:'#3d1a00',border:'#d35400',accent:'#ff8833',icon:'💥', rar:'★★☆',desc:'מכה חזקה'},
  {name:'עמדת ברזל',type:'defense',value:12, cost:2, bg:'#0a3d0a',border:'#27ae60',accent:'#55ff88',icon:'🏰',rar:'★★☆',desc:'מגן ברזל'},
  {name:'התלקחות',  type:'attack', value:22, cost:3, bg:'#2d0a3d',border:'#8e44ad',accent:'#cc66ff',icon:'🔥', rar:'★★★',desc:'כוח עצום'}
];
const rndCard=()=>CARDS[Math.floor(Math.random()*CARDS.length)];

// ═══════════════════════════════════════
// CARD TEXTURE (bigger, clearer fonts)
// ═══════════════════════════════════════
const texCache={};
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function mkTex(ct) {
  if(texCache[ct.name]) return texCache[ct.name];
  const W=600,H=860, c=document.createElement('canvas'); c.width=W; c.height=H;
  const ctx=c.getContext('2d');

  // BG
  const bg=ctx.createLinearGradient(0,0,0,H); bg.addColorStop(0,ct.bg); bg.addColorStop(1,'#0d0520');
  rr(ctx,0,0,W,H,40); ctx.fillStyle=bg; ctx.fill();

  // Outer gold border
  rr(ctx,6,6,W-12,H-12,36); ctx.strokeStyle='#c9a84c'; ctx.lineWidth=4; ctx.stroke();
  // Inner border
  rr(ctx,16,16,W-32,H-32,30); ctx.strokeStyle=ct.border+'bb'; ctx.lineWidth=2; ctx.stroke();

  // Mana circle
  const mg=ctx.createRadialGradient(72,72,0,72,72,38); mg.addColorStop(0,'#5599ff'); mg.addColorStop(1,'#1133bb');
  ctx.beginPath(); ctx.arc(72,72,38,0,Math.PI*2); ctx.fillStyle=mg; ctx.fill();
  ctx.strokeStyle='#aaccff'; ctx.lineWidth=3; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 44px Georgia'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(ct.cost,72,74);

  // Card name (large, clear)
  ctx.textBaseline='alphabetic';
  ctx.fillStyle='#f0e0a0'; ctx.font='bold 46px Georgia'; ctx.textAlign='center';
  ctx.shadowColor='#c9a84c'; ctx.shadowBlur=22;
  ctx.fillText(ct.name,W/2,84); ctx.shadowBlur=0;

  // Type tag
  rr(ctx,W/2-95,100,190,32,16); ctx.fillStyle=ct.border+'66'; ctx.fill();
  ctx.fillStyle=ct.accent; ctx.font='bold 20px Georgia';
  ctx.fillText(ct.type==='attack'?'⚔ התקפה':'🛡 הגנה',W/2,122);

  // Art frame
  const ay=148, ah=310;
  rr(ctx,24,ay,W-48,ah,14); ctx.save(); ctx.clip();

  // Art background
  const ab=ctx.createRadialGradient(W/2,ay+ah/2,10,W/2,ay+ah/2,180);
  ab.addColorStop(0,ct.bg); ab.addColorStop(1,'#050310');
  ctx.fillStyle=ab; ctx.fillRect(24,ay,W-48,ah);

  // Glow bloom
  const gl=ctx.createRadialGradient(W/2,ay+ah*.6,0,W/2,ay+ah*.6,130);
  gl.addColorStop(0,ct.border+'cc'); gl.addColorStop(0.5,ct.border+'44'); gl.addColorStop(1,'transparent');
  ctx.fillStyle=gl; ctx.fillRect(24,ay,W-48,ah);

  // Sparkles
  for(let i=0;i<35;i++){
    ctx.beginPath(); ctx.arc(24+Math.random()*(W-48), ay+Math.random()*ah, Math.random()*3+.5,0,Math.PI*2);
    ctx.fillStyle=ct.accent+Math.floor(Math.random()*150+80).toString(16); ctx.fill();
  }

  // Big icon
  ctx.font='140px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor=ct.border; ctx.shadowBlur=30;
  ctx.fillText(ct.icon, W/2, ay+ah*.58); ctx.shadowBlur=0;
  ctx.restore();

  // Art border
  rr(ctx,24,ay,W-48,ah,14); ctx.strokeStyle='#c9a84c66'; ctx.lineWidth=2; ctx.stroke();

  // Divider
  const dy=ay+ah+20;
  const dg=ctx.createLinearGradient(30,0,W-30,0);
  dg.addColorStop(0,'transparent'); dg.addColorStop(.3,'#c9a84c'); dg.addColorStop(.7,'#c9a84c'); dg.addColorStop(1,'transparent');
  ctx.strokeStyle=dg; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(30,dy); ctx.lineTo(W-30,dy); ctx.stroke();
  ctx.save(); ctx.translate(W/2,dy); ctx.rotate(Math.PI/4);
  ctx.fillStyle='#c9a84c'; ctx.fillRect(-6,-6,12,12); ctx.restore();

  // Description (BIG clear font)
  const vTxt = ct.type==='attack' ? `⚔  גרום  ${ct.value}  נזק` : `🛡  הוסף  ${ct.value}  הגנה`;
  ctx.fillStyle='#ffffff'; ctx.font='bold 34px Georgia'; ctx.textAlign='center';
  ctx.shadowColor=ct.border; ctx.shadowBlur=10;
  ctx.fillText(vTxt, W/2, dy+52); ctx.shadowBlur=0;

  // Flavor
  const fl={'התקפה':'"הלהב מדבר בשפת כאב"','הגנה':'"עמוד מול הסערה"','מכה חזקה':'"עוצמה ללא רחמים"','עמדת ברזל':'"בלתי שביר"','התלקחות':'"האש אינה מבחינה"'};
  ctx.fillStyle='#9c7fcc'; ctx.font='italic 22px Georgia';
  ctx.fillText(fl[ct.name]||'', W/2, dy+86);

  // Stat badge
  const by=dy+130, bc=ct.type==='attack'?'#aa1100':'#113388', bb=ct.type==='attack'?'#ff5555':'#5599ff';
  const bg2=ctx.createRadialGradient(90,by,0,90,by,42); bg2.addColorStop(0,bc); bg2.addColorStop(1,'#000c');
  ctx.beginPath(); ctx.arc(90,by,42,0,Math.PI*2); ctx.fillStyle=bg2; ctx.fill();
  ctx.strokeStyle=bb; ctx.lineWidth=3; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 40px Georgia'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(ct.value,90,by); ctx.textBaseline='alphabetic';
  ctx.fillStyle=bb; ctx.font='bold 18px Georgia'; ctx.fillText(ct.type==='attack'?'נזק':'הגנה',90,by+24);

  // Rarity
  ctx.fillStyle='#c9a84c'; ctx.font='28px Georgia'; ctx.textAlign='center';
  ctx.fillText(ct.rar, W/2, by+8);

  // Bottom ornament
  ctx.fillStyle='#c9a84c55'; ctx.font='20px Georgia';
  ctx.fillText('❈  ✦  ❈', W/2, H-30);

  const tex=new THREE.CanvasTexture(c); texCache[ct.name]=tex; return tex;
}

// ═══════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════
const gs={
  playerHP:80,playerMaxHP:80,playerBlock:0,
  enemyHP:60,maxEnemyHP:60,enemyBlock:0,
  enemyIntent:{type:'attack',value:10},
  hand:[],deck:[],discard:[],enemy:null,
  turn:'player',energy:3,maxEnergy:3
};
const interactive=[], particles=[];
const pGeo=new THREE.SphereGeometry(0.04,6,6);
let endBtn=null, hoveredCard=null;

// ═══════════════════════════════════════
// CREATE CARD (bigger: 0.65 x 0.94)
// ═══════════════════════════════════════
function mkCard(ct) {
  const g=new THREE.Group();
  // Slightly thick card body for 3D feel
  const body=new THREE.Mesh(new THREE.BoxGeometry(0.65,0.94,0.015),new THREE.MeshStandardMaterial({color:0x1a0a30,roughness:.5}));
  body.castShadow=true; g.add(body);
  // Face
  const face=new THREE.Mesh(new THREE.PlaneGeometry(0.64,0.93),new THREE.MeshStandardMaterial({map:mkTex(ct),roughness:.12,metalness:.08}));
  face.position.z=.009; g.add(face);
  // Glow halo
  const glow=new THREE.Mesh(new THREE.PlaneGeometry(0.74,1.03),new THREE.MeshBasicMaterial({color:new THREE.Color(ct.border),transparent:true,opacity:0,side:THREE.DoubleSide}));
  glow.position.z=-.01; g.add(glow);
  g.userData={isCard:true,cardData:ct,isAnimating:false,glow,baseY:0,phase:Math.random()*Math.PI*2,hoverT:0,hoverTarget:0};
  return g;
}

// ═══════════════════════════════════════
// HEALTH BAR
// ═══════════════════════════════════════
function mkBar() {
  const W=1.4,H=.1, grp=new THREE.Group();
  const bg=new THREE.Mesh(new THREE.PlaneGeometry(W,H),new THREE.MeshBasicMaterial({color:0x111111})); bg.position.z=.01; grp.add(bg);
  const hp=new THREE.Mesh(new THREE.PlaneGeometry(W,H),new THREE.MeshBasicMaterial({color:0xc0392b})); hp.position.z=.02; grp.add(hp);
  const blk=new THREE.Mesh(new THREE.PlaneGeometry(W,H),new THREE.MeshBasicMaterial({color:0x2980b9})); blk.position.z=.03; blk.scale.x=0; grp.add(blk);
  grp.userData={hp,blk,W}; return grp;
}
function updBar(bar,cur,max,blk){
  const r=Math.max(0,cur/max); bar.userData.hp.scale.x=r; bar.userData.hp.position.x=(bar.userData.W*(r-1))/2;
  if(blk>0){const br=Math.min(1,blk/max);bar.userData.blk.scale.x=br;bar.userData.blk.position.x=(bar.userData.W*(br-1))/2;bar.userData.blk.visible=true;}
  else bar.userData.blk.visible=false;
}

// ═══════════════════════════════════════
// ENEMY (detailed multi-part)
// ═══════════════════════════════════════
function mkEnemy() {
  const g=new THREE.Group();

  // Body - dark crystal golem
  const bodyMat=new THREE.MeshStandardMaterial({color:0x3a0808,roughness:.25,metalness:.7,emissive:0x220000,emissiveIntensity:.4});
  const body=new THREE.Mesh(new THREE.ConeGeometry(.5,1.3,7),bodyMat); body.castShadow=true; g.add(body);

  // Shoulders
  [-0.45,0.45].forEach(x=>{
    const sh=new THREE.Mesh(new THREE.SphereGeometry(.22,8,8),bodyMat); sh.position.set(x,.15,.1); sh.castShadow=true; g.add(sh);
    // Arms
    const arm=new THREE.Mesh(new THREE.CylinderGeometry(.08,.12,.5,6),bodyMat); arm.position.set(x,-.18,.1); arm.rotation.z=x>0?-0.4:0.4; arm.castShadow=true; g.add(arm);
  });

  // Head
  const headMat=new THREE.MeshStandardMaterial({color:0x550a0a,roughness:.2,metalness:.8,emissive:0x330000,emissiveIntensity:.5});
  const head=new THREE.Mesh(new THREE.SphereGeometry(.3,10,10),headMat); head.position.set(0,.85,.05); head.castShadow=true; g.add(head);

  // Horns
  [-0.15,0.15].forEach(x=>{
    const horn=new THREE.Mesh(new THREE.ConeGeometry(.06,.3,6),bodyMat); horn.position.set(x,1.2,.05); horn.rotation.z=x>0?0.3:-0.3; g.add(horn);
  });

  // Eyes (glowing)
  const eyeMat=new THREE.MeshBasicMaterial({color:0xff2200}); const eyeGlow=new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:.5});
  const eyeL=new THREE.Mesh(new THREE.SphereGeometry(.08,10,10),eyeMat.clone()); eyeL.position.set(-.11,.88,.28);
  const eyeR=new THREE.Mesh(new THREE.SphereGeometry(.08,10,10),eyeMat.clone()); eyeR.position.set(.11,.88,.28);
  const eyeLG=new THREE.Mesh(new THREE.SphereGeometry(.13,8,8),eyeGlow.clone()); eyeLG.position.copy(eyeL.position);
  const eyeRG=new THREE.Mesh(new THREE.SphereGeometry(.13,8,8),eyeGlow.clone()); eyeRG.position.copy(eyeR.position);
  g.add(eyeL);g.add(eyeR);g.add(eyeLG);g.add(eyeRG);

  // Aura particles ring
  const auraGeo=new THREE.BufferGeometry(); const ap=new Float32Array(60*3);
  for(let i=0;i<60;i++){const a=(i/60)*Math.PI*2,r=.65+Math.random()*.15;ap[i*3]=Math.cos(a)*r;ap[i*3+1]=Math.sin(a)*r*.4-.1;ap[i*3+2]=(Math.random()-.5)*.2;}
  auraGeo.setAttribute('position',new THREE.BufferAttribute(ap,3));
  const aura=new THREE.Points(auraGeo,new THREE.PointsMaterial({color:0xff2200,size:.05,transparent:true,opacity:.7}));
  g.add(aura);

  // Health bar
  const bar=mkBar(); bar.position.y=1.45; g.add(bar);

  // Intent display
  const ic=document.createElement('canvas'); ic.width=200; ic.height=80;
  const it=new THREE.CanvasTexture(ic);
  const im=new THREE.Mesh(new THREE.PlaneGeometry(.7,.28),new THREE.MeshBasicMaterial({map:it,transparent:true}));
  im.position.y=1.72; g.add(im);

  g.position.set(0,.5,0); stage.add(g);
  g.userData={bar,ic,it,eyeL,eyeR,eyeLG,eyeRG,aura,baseY:.5};
  return g;
}

function rollIntent() {
  gs.enemyIntent=Math.random()>.4?{type:'attack',value:Math.floor(Math.random()*10)+6}:{type:'defense',value:Math.floor(Math.random()*8)+5};
  const ctx=gs.enemy.userData.ic.getContext('2d');
  ctx.clearRect(0,0,200,80); ctx.fillStyle='rgba(0,0,0,.82)'; ctx.fillRect(0,0,200,80);
  ctx.strokeStyle=gs.enemyIntent.type==='attack'?'#ff4433':'#4488ff'; ctx.lineWidth=2; ctx.strokeRect(2,2,196,76);
  const atk=gs.enemyIntent.type==='attack';
  ctx.fillStyle=atk?'#ff7755':'#77aaff'; ctx.font='bold 18px Arial'; ctx.textAlign='center';
  ctx.fillText(atk?'⚔ מתכנן לתקוף':'🛡 מתכנן להגן',100,30);
  ctx.font='bold 36px Arial'; ctx.fillStyle=atk?'#ff2200':'#2277ff';
  ctx.fillText(gs.enemyIntent.value,100,66);
  gs.enemy.userData.it.needsUpdate=true;
  document.getElementById('itn').textContent=atk?`⚔ ${gs.enemyIntent.value} נזק`:`🛡 ${gs.enemyIntent.value} הגנה`;
}

// ═══════════════════════════════════════
// END TURN BUTTON
// ═══════════════════════════════════════
function mkEndBtn() {
  const g=new THREE.Group();
  const mesh=new THREE.Mesh(new THREE.BoxGeometry(.62,.25,.07),new THREE.MeshStandardMaterial({color:0x1a5c2a,roughness:.3,metalness:.3})); mesh.castShadow=true; g.add(mesh);
  const border=new THREE.Mesh(new THREE.BoxGeometry(.66,.29,.065),new THREE.MeshBasicMaterial({color:0x27ae60,transparent:true,opacity:.4})); border.position.z=-.003; g.add(border);
  const cv=document.createElement('canvas'); cv.width=220; cv.height=90; const ctx=cv.getContext('2d');
  ctx.fillStyle='#33ee66'; ctx.font='bold 30px Georgia'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('סיום תור',110,45);
  const sp=new THREE.Mesh(new THREE.PlaneGeometry(.58,.21),new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(cv),transparent:true})); sp.position.z=.038; g.add(sp);
  g.position.set(1.5,-1.35,0);
  g.userData={isEndTurnButton:true,mesh,border}; stage.add(g); interactive.push(g); return g;
}

// ═══════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════
function burst(pos,col,n=15) {
  for(let i=0;i<n;i++){
    const m=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:.9,transparent:true});
    const p=new THREE.Mesh(pGeo,m); p.position.copy(pos);
    p.vel={x:(Math.random()-.5)*1.8,y:Math.random()*1.4+.3,z:(Math.random()-.5)*.8};
    p.life=1; p.scale.setScalar(.4+Math.random()*1); stage.add(p); particles.push(p);
  }
}
function tickParticles() {
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.life-=.032;
    p.position.x+=p.vel.x*.032; p.position.y+=p.vel.y*.032; p.position.z+=p.vel.z*.032;
    p.vel.y-=.03; p.material.opacity=p.life; p.scale.setScalar(p.life*.9);
    if(p.life<=0){stage.remove(p);p.material.dispose();particles.splice(i,1);}
  }
}

// ═══════════════════════════════════════
// DECK / DRAW
// ═══════════════════════════════════════
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function genDeck(){gs.deck=[];for(let i=0;i<5;i++)gs.deck.push(CARDS[0]);for(let i=0;i<5;i++)gs.deck.push(CARDS[1]);for(let i=0;i<5;i++)gs.deck.push(rndCard());shuffle(gs.deck);}

function handPos(i,n){const sp=.72,tw=(n-1)*sp;return{x:i*sp-tw/2,y:-1.28};}

function reposition(){const n=gs.hand.length;gs.hand.forEach((c,i)=>{if(c.userData.isAnimating)return;const p=handPos(i,n);c.userData.baseY=p.y;c.rotation.z=p.x*-.12;});}

function drawCards(n) {
  for(let i=0;i<n;i++){
    if(gs.hand.length>=8)break;
    if(gs.deck.length===0){gs.deck=[...gs.discard];gs.discard=[];shuffle(gs.deck);}
    if(gs.deck.length===0)break;
    const ct=gs.deck.pop(), card=mkCard(ct);
    card.position.set(2,-2,0); card.scale.setScalar(.05);
    gs.hand.push(card); stage.add(card); interactive.push(card);
    const idx=gs.hand.length-1;
    setTimeout(()=>{
      sndDraw();
      const p=handPos(idx,gs.hand.length),t0=performance.now(),dur=340;
      function fly(){const t=Math.min(1,(performance.now()-t0)/dur),e=1-Math.pow(1-t,3);
        card.position.x=THREE.MathUtils.lerp(2,p.x,e); card.position.y=THREE.MathUtils.lerp(-2,p.y,e);
        card.scale.setScalar(THREE.MathUtils.lerp(.05,1,e));
        if(t<1)requestAnimationFrame(fly);else{card.userData.baseY=p.y;reposition();}}
      fly();
    },idx*110);
  }
}

// ═══════════════════════════════════════
// PLAY CARD
// ═══════════════════════════════════════
function shakeObj(obj){const o=obj.position.clone();for(let i=0;i<7;i++)setTimeout(()=>{obj.position.x=o.x+(Math.random()-.5)*.18;obj.position.y=o.y+(Math.random()-.5)*.1;},i*38);setTimeout(()=>obj.position.copy(o),270);}

function playCard(card) {
  const d=card.userData.cardData;
  if(gs.energy<d.cost){shakeObj(card);return;}
  sndCard(); card.userData.isAnimating=true; gs.energy-=d.cost;
  gs.hand.splice(gs.hand.indexOf(card),1);
  const ix=interactive.indexOf(card);if(ix>-1)interactive.splice(ix,1);
  reposition();
  const s0=card.position.clone(),t0=performance.now(),dur=400;
  function fly(){const t=Math.min(1,(performance.now()-t0)/dur),e=t<.5?2*t*t:-1+(4-2*t)*t;
    card.position.x=THREE.MathUtils.lerp(s0.x,0,e); card.position.y=THREE.MathUtils.lerp(s0.y,.5,e); card.position.z=THREE.MathUtils.lerp(s0.z,2,e);
    card.scale.setScalar(THREE.MathUtils.lerp(1,1.4,Math.min(t*2,1)));
    if(t<1)requestAnimationFrame(fly);else{applyEffect(d);stage.remove(card);gs.discard.push(d);updUI();}}
  fly();
}

function applyEffect(d) {
  if(d.type==='attack'){
    let dm=d.value; if(gs.enemyBlock>=dm){gs.enemyBlock-=dm;dm=0;}else{dm-=gs.enemyBlock;gs.enemyBlock=0;gs.enemyHP=Math.max(0,gs.enemyHP-dm);}
    sndHit(); burst(gs.enemy.position.clone(),0xff2200,25); shakeObj(gs.enemy);
    ['eyeL','eyeR'].forEach(k=>{gs.enemy.userData[k].material.color.setHex(0xffffff);setTimeout(()=>{if(gs.enemy)gs.enemy.userData[k].material.color.setHex(0xff2200);},250);});
    if(gs.enemyHP<=0)setTimeout(victory,300);
  } else {
    sndShield(); gs.playerBlock+=d.value; burst(new THREE.Vector3(-1,-.5,0),0x2980b9,18);
  }
  updBar(gs.enemy.userData.bar,gs.enemyHP,gs.maxEnemyHP,gs.enemyBlock);
}

// ═══════════════════════════════════════
// ENEMY TURN
// ═══════════════════════════════════════
async function enemyTurn() {
  if(gs.turn!=='player')return;
  sndEndTurn(); gs.turn='enemy'; endBtn.userData.mesh.material.color.setHex(0x333333); updUI();
  await new Promise(r=>setTimeout(r,700));
  if(gs.enemyIntent.type==='attack'){
    let dm=gs.enemyIntent.value; if(gs.playerBlock>=dm){gs.playerBlock-=dm;}else{dm-=gs.playerBlock;gs.playerBlock=0;gs.playerHP=Math.max(0,gs.playerHP-dm);}
    sndHit(); burst(new THREE.Vector3(-.5,-.8,0),0xcc2200,22); shakeObj(stage);
  }else{gs.enemyBlock+=gs.enemyIntent.value;sndShield();burst(gs.enemy.position.clone(),0x2266cc,16);}
  while(gs.hand.length>0){const c=gs.hand.pop();stage.remove(c);const ix=interactive.indexOf(c);if(ix>-1)interactive.splice(ix,1);gs.discard.push(c.userData.cardData);}
  await new Promise(r=>setTimeout(r,700));
  if(gs.playerHP<=0){gs.turn='end';sndDefeat();showMsg('💀  הפסדת  💀','#ff3333');return;}
  gs.turn='player';gs.energy=gs.maxEnergy;gs.playerBlock=0;gs.enemyBlock=0;
  rollIntent();drawCards(5);endBtn.userData.mesh.material.color.setHex(0x1a5c2a);updUI();
}

function victory(){gs.turn='end';sndVictory();showMsg('🏆  ניצחת!  🏆','#c9a84c');for(let i=0;i<6;i++)setTimeout(()=>burst(new THREE.Vector3((Math.random()-.5)*3,(Math.random()-.5),0),0xc9a84c,30),i*160);}

// ═══════════════════════════════════════
// UI
// ═══════════════════════════════════════
function updUI(){
  document.getElementById('php').textContent=`${gs.playerHP} / ${gs.playerMaxHP}`;
  document.getElementById('nrg').textContent=`${gs.energy} / ${gs.maxEnergy}`;
  document.getElementById('ehp').textContent=`${gs.enemyHP} / ${gs.maxEnemyHP}`;
  document.getElementById('trn').textContent=gs.turn==='player'?'שלך':gs.turn==='enemy'?'אויב':'סיום';
  document.getElementById('dn').textContent=gs.deck.length;
  document.getElementById('di').textContent=gs.discard.length;
  const pb=document.getElementById('pblk');
  if(gs.playerBlock>0){pb.style.display='block';document.getElementById('pblkv').textContent=gs.playerBlock;}else pb.style.display='none';
  updBar(gs.enemy.userData.bar,gs.enemyHP,gs.maxEnemyHP,gs.enemyBlock);
}
function showMsg(txt,col='#c9a84c'){const el=document.getElementById('msg');el.textContent=txt;el.style.color=col;el.style.opacity=1;setTimeout(()=>el.style.opacity=0,5000);}

// ═══════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════
const ray=new THREE.Raycaster(), mouse=new THREE.Vector2();
function hitTest(rc){
  if(gs.turn!=='player')return;
  const hits=rc.intersectObjects(interactive,true);if(!hits.length)return;
  let t=hits[0].object;while(t.parent&&!t.userData.isCard&&!t.userData.isEndTurnButton)t=t.parent;
  if(t.userData.isCard&&!t.userData.isAnimating)playCard(t);
  if(t.userData.isEndTurnButton)enemyTurn();
}
window.addEventListener('click',e=>{if(renderer.xr.isPresenting)return;mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;ray.setFromCamera(mouse,camera);hitTest(ray);});
window.addEventListener('mousemove',e=>{
  if(renderer.xr.isPresenting)return;
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(interactive,true);let nh=null;
  if(hits.length){let t=hits[0].object;while(t.parent&&!t.userData.isCard)t=t.parent;if(t.userData.isCard&&!t.userData.isAnimating)nh=t;}
  if(nh!==hoveredCard){if(hoveredCard)hoveredCard.userData.hoverTarget=0;if(nh)nh.userData.hoverTarget=1;hoveredCard=nh;}
});

// ═══════════════════════════════════════
// VR
// ═══════════════════════════════════════
function setupVR(){
  for(let i=0;i<2;i++){
    const ctrl=renderer.xr.getController(i);
    ctrl.addEventListener('selectstart',()=>{startAudio();const mat=new THREE.Matrix4().extractRotation(ctrl.matrixWorld);const vr=new THREE.Raycaster();vr.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);vr.ray.direction.set(0,0,-1).applyMatrix4(mat);hitTest(vr);});
    scene.add(ctrl);
    const lg=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,0,-6)]);
    ctrl.add(new THREE.Line(lg,new THREE.LineBasicMaterial({color:0xc9a84c,transparent:true,opacity:.5})));
  }
}
const vrb=document.getElementById('vrb');
if('xr' in navigator){
  navigator.xr.isSessionSupported('immersive-vr').then(ok=>{
    if(ok){vrb.addEventListener('click',async()=>{startAudio();const s=await navigator.xr.requestSession('immersive-vr',{optionalFeatures:['local-floor']});renderer.xr.setSession(s);s.addEventListener('end',()=>{vrb.textContent='☽ מציאות מדומה';});vrb.textContent='✕ יציאה';});}
    else{vrb.textContent='VR לא נתמך';vrb.disabled=true;}
  });
}else{vrb.textContent='פתח בדפדפן Quest';vrb.disabled=true;}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
gs.enemy=mkEnemy(); endBtn=mkEndBtn();
eLight.position.copy(gs.enemy.position).add(new THREE.Vector3(0,.5,1.5));
setupVR(); genDeck(); rollIntent(); drawCards(5); updUI();

// ═══════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════
let clk=0;
renderer.setAnimationLoop(()=>{
  clk+=.012;
  bgStars.rotation.y=clk*.008; bgGold.rotation.x=clk*.007; bgGold.rotation.y=clk*.013;
  pLight.position.x=Math.cos(clk*.35)*5; pLight.position.z=Math.sin(clk*.35)*4+2;

  // Fire light flicker
  fLight.intensity=2+Math.sin(clk*11)*.5+Math.sin(clk*19)*.25;

  // Torch flicker
  stage.children.forEach(c=>{
    if(c.isPointLight&&c.userData.isTorch) c.intensity=c.userData.baseIntensity+Math.sin(clk*13+c.position.x)*.6;
    if(c.isMesh&&c.userData.isFlame){c.scale.y=1+Math.sin(clk*9+c.position.x)*.2;c.scale.x=1+Math.sin(clk*7)*.1;c.position.y=2.25+Math.sin(clk*8)*.04;}
  });

  // Enemy animation
  if(gs.enemy){
    gs.enemy.position.y=gs.enemy.userData.baseY+Math.sin(clk*1.1)*.07;
    gs.enemy.rotation.y=Math.sin(clk*.45)*.2;
    // Eye glow pulse
    ['eyeLG','eyeRG'].forEach(k=>{ if(gs.enemy.userData[k]) gs.enemy.userData[k].material.opacity=.4+Math.sin(clk*4)*.2; });
    // Aura rotation
    if(gs.enemy.userData.aura) gs.enemy.userData.aura.rotation.y=clk*.8;
    eLight.position.copy(gs.enemy.position).add(new THREE.Vector3(0,.5,1.5));
    eLight.intensity=2+Math.sin(clk*5)*.6;
  }

  // Card float + hover
  gs.hand.forEach(c=>{
    if(c.userData.isAnimating)return;
    const ph=c.userData.phase+clk, ty=c.userData.baseY+Math.sin(ph)*.022;
    c.userData.hoverT=THREE.MathUtils.lerp(c.userData.hoverT,c.userData.hoverTarget||0,.1);
    const hl=c.userData.hoverT*.32, hs=1+c.userData.hoverT*.12;
    c.position.y+=(ty+hl-c.position.y)*.1;
    c.scale.setScalar(THREE.MathUtils.lerp(c.scale.x,hs,.1));
    c.userData.glow.material.opacity=c.userData.hoverT*.3+Math.sin(ph*2)*.025;
  });

  // End button pulse
  if(endBtn&&gs.turn==='player') endBtn.userData.border.material.opacity=.3+Math.sin(clk*2.5)*.15;

  tickParticles();
  renderer.render(scene,camera);
});

window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
